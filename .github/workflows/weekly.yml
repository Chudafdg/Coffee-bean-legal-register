name: Weekly Legal Register Check

on:
  schedule:
    - cron: '0 1 * * 1'  # ทำงานทุกวันจันทร์ 08:00 น. เวลาไทย
  workflow_dispatch:     # ปุ่มให้เรากดรันเองได้ตลอดเวลา

jobs:
  check-regulations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ดึงข้อมูลโปรเจกต์มาเตรียมพร้อม
        uses: actions/checkout@v4

      - name: ติดตั้ง Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ติดตั้งเครื่องมือ Gemini AI
        run: pip install google-generativeai

      - name: เริ่มตรวจสอบกฎหมาย
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/check_updates.py

      - name: บันทึกผลการอัปเดตลงระบบ
        run: |
          git config user.email "qa-bot@github.com"
          git config user.name "QA Regulation Bot"
          git add data/regulations.json
          git diff --staged --quiet || git commit -m "อัปเดตสถานะกฎหมายประจำสัปดาห์ $(date +%Y-%m-%d)"
          git push
