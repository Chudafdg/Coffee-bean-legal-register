name: Weekly Regulation Check

on:
  schedule:
    - cron: '0 1 * * 1'   # ทุกวันจันทร์ 08:00 น. ไทย (UTC+7)
  workflow_dispatch:        # รันมือได้ทันที

jobs:
  check-regulations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ดึงข้อมูลโปรเจกต์มาเตรียมพร้อม
        uses: actions/checkout@v4

      - name: ติดตั้ง Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ติดตั้งเครื่องมือ Google AI
        run: pip install google-generativeai requests

      - name: เริ่มตรวจสอบกฎหมาย
        env:
          GOOGLE_AI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/check_updates.py

      - name: บันทึกผลการอัปเดตลงระบบ
        run: |
          git config user.email "bot@github.com"
          git config user.name "Regulation Bot"
          git add data/regulations.json
          git diff --staged --quiet || git commit -m "update: weekly check $(date +%Y-%m-%d)"
          git push

      - name: ส่งอีเมลแจ้งเตือน
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[กาแฟโรบัสต้า] ผลตรวจสอบกฎหมาย"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Regulation Bot <${{ secrets.GMAIL_USER }}>
          body: |
            ระบบตรวจสอบกฎหมายเมล็ดกาแฟโรบัสต้า
            =======================================
            สถานะ: ${{ job.status }}

            ดูรายละเอียด: https://${{ github.repository_owner }}.github.io/Coffee-bean-legal-register
            ดู log: https://github.com/${{ github.repository }}/actions
